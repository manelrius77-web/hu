workflows:
  capacitor-ios-android:
    name: Capacitor iOS & Android
    max_build_duration: 120
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic API

    environment:
      groups:
        - capacitor_config
      vars:
        XCODE_WORKSPACE: "frontend/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.manelrius.huchas"
        APP_STORE_APP_ID: 6762413282
      node: 20
      xcode: 16.0
      cocoapods: default

    scripts:
      - name: Debug structure
        script: |
          pwd
          ls frontend
          

      - name: Install dependencies
        script: |
          cd Frontal
          yarn install

      - name: Build web
        script: |
          cd Frontal
          yarn build

      - name: Capacitor sync
        script: |
          cd Frontal
          npx cap sync

      - name: Build iOS
        script: |
          cd Frontal/ios/App
          pod install
          xcodebuild -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive

    artifacts:
      - $CM_BUILD_DIR/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
